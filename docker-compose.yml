services:
  db:
    image: postgres:16
    container_name: innovation-bot-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: botuser
      POSTGRES_PASSWORD: botpass
      POSTGRES_DB: innovation_bot
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U botuser -d innovation_bot"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
